# Per-app nginx for mtm-frontend. Two jobs: serve the React build (with an SPA
# fallback) and forward the API paths to the backend. Mirrors ayto-webapp's
# frontend/nginx.conf convention.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Streaming chat responses — proxy_buffering off so chunks reach the
    # browser as the backend emits them instead of being buffered whole.
    # Must come before the plain /chat block below (nginx picks the longest
    # matching prefix, so this wins for /chat/stream specifically).
    location /chat/stream {
        proxy_pass http://mtm-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location /chat {
        proxy_pass http://mtm-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /reset {
        proxy_pass http://mtm-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Generated chart images (tools.generateChart -> static/charts/*).
    location /static/ {
        proxy_pass http://mtm-backend:8000;
        proxy_set_header Host $host;
    }

    # Unknown paths fall back to index.html so deep links / refreshes work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
